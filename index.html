<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h1>📚 AI Smart Study Assistant</h1>
<button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>

<div class="input-section">
    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="date" id="deadline">

    <select id="priority">
        <option value="High">High 🔴</option>
        <option value="Medium">Medium 🟡</option>
        <option value="Low">Low 🟢</option>
    </select>

    <button onclick="addTask()">Add</button>
</div>

<h3 id="progress">Progress: 0%</h3>
<ul id="taskList"></ul>

<h2>⏱️ Pomodoro Timer</h2>
<p id="timer">25:00</p>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<hr>

<h2>🤖 AI Chat Assistant</h2>

<div id="chatBox"></div>

<div class="suggestions">
    <button onclick="quickAsk('What is Java?')">What is Java?</button>
    <button onclick="quickAsk('How to study effectively?')">Study Tips</button>
    <button onclick="quickAsk('Healthy food to eat')">Healthy Food</button>
    <button onclick="quickAsk('Motivate me')">Motivate Me</button>
</div>

<div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask anything...">
    <button onclick="askAI()">Send</button>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
